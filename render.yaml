services:
  - type: web
    name: elms-app
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: elms-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: elms-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: elms-db
          property: password

databases:
  - name: elms-db
    databaseName: elmsdb
    user: elmsuser
    plan: free
