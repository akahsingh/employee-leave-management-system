<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ELMS - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <link href="/css/style.css" rel="stylesheet"/>
</head>
<body class="login-page">
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">
            <div class="logo-icon"><i class="fas fa-calendar-check"></i></div>
            <h1 class="login-title">ELMS</h1>
            <p class="login-subtitle">Employee Leave Management System</p>
        </div>

        <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i><span th:text="${errorMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${logoutMsg}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-2"></i><span th:text="${logoutMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-4">
                <label class="form-label fw-semibold">Username</label>
                <div class="input-group input-group-lg">
                    <span class="input-group-text login-input-icon"><i class="fas fa-user"></i></span>
                    <input type="text" name="username" class="form-control login-input" placeholder="Enter username" required autofocus/>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <div class="input-group input-group-lg">
                    <span class="input-group-text login-input-icon"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" id="password" class="form-control login-input" placeholder="Enter password" required/>
                    <button class="btn login-input-icon" type="button" onclick="togglePassword()">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-login w-100 btn-lg">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </button>
        </form>

        <div class="login-hints mt-4">
            <p class="text-muted small mb-2 fw-semibold">Demo Credentials:</p>
            <div class="d-flex flex-wrap gap-2">
                <span class="badge-hint badge-admin">Admin: admin / admin@123</span>
                <span class="badge-hint badge-manager">Manager: manager1 / manager@123</span>
                <span class="badge-hint badge-employee">Employee: emp1 / emp@123</span>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function togglePassword() {
        const pwd = document.getElementById('password');
        const eye = document.getElementById('eyeIcon');
        if (pwd.type === 'password') { pwd.type = 'text'; eye.classList.replace('fa-eye','fa-eye-slash'); }
        else { pwd.type = 'password'; eye.classList.replace('fa-eye-slash','fa-eye'); }
    }
</script>
</body>
</html>
