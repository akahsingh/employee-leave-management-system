<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ELMS — Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="/css/style.css" rel="stylesheet"/>
</head>
<body class="login-page">
<div class="login-wrapper">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-circle"><i class="fas fa-calendar-check"></i></div>
      <div class="login-brand">ELMS</div>
      <div class="login-tagline">Employee Leave Management System</div>
    </div>

    <div th:if="${errorMsg}" class="alert alert-danger mb-4">
      <i class="fas fa-exclamation-circle me-2"></i><span th:text="${errorMsg}"></span>
    </div>
    <div th:if="${logoutMsg}" class="alert alert-success mb-4">
      <i class="fas fa-check-circle me-2"></i><span th:text="${logoutMsg}"></span>
    </div>

    <form th:action="@{/login}" method="post">
      <div class="mb-4">
        <label class="login-label">Username</label>
        <div class="login-field">
          <span class="login-field-icon"><i class="fas fa-user"></i></span>
          <input type="text" name="username" placeholder="Enter your username" required autofocus/>
        </div>
      </div>
      <div class="mb-5">
        <label class="login-label">Password</label>
        <div class="login-field">
          <span class="login-field-icon"><i class="fas fa-lock"></i></span>
          <input type="password" name="password" id="pwd" placeholder="Enter your password" required/>
          <button type="button" onclick="togglePwd()"><i class="fas fa-eye" id="eyeIco"></i></button>
        </div>
      </div>
      <button type="submit" class="btn-login">
        <i class="fas fa-sign-in-alt me-2"></i>Sign In
      </button>
    </form>

    <div class="demo-creds">
      <p>Demo Accounts</p>
      <div>
        <span class="cred-pill cred-admin"><i class="fas fa-shield-alt"></i> admin / admin@123</span>
        <span class="cred-pill cred-manager"><i class="fas fa-user-tie"></i> manager1 / manager@123</span>
        <span class="cred-pill cred-employee"><i class="fas fa-user"></i> emp1 / emp@123</span>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePwd(){
  const p=document.getElementById('pwd'),e=document.getElementById('eyeIco');
  p.type=p.type==='password'?'text':'password';
  e.classList.toggle('fa-eye');e.classList.toggle('fa-eye-slash');
}
</script>
</body>
</html>
