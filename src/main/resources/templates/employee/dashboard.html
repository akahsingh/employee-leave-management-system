<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>My Dashboard — ELMS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="/css/style.css" rel="stylesheet"/>
</head>
<body class="app-body">
<div class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon"><i class="fas fa-calendar-check"></i></div>
    <div><div class="brand-text">ELMS</div><div class="brand-sub">Leave Management</div></div>
  </div>
  <div class="sidebar-divider"></div>
  <nav class="sidebar-nav">
    <div class="sidebar-section">Main</div>
    <a href="/employee/dashboard" class="nav-link active"><i class="fas fa-grid-2"></i><span>Dashboard</span></a>
    <a href="/employee/leaves" class="nav-link"><i class="fas fa-paper-plane"></i><span>My Leaves</span></a>
    <a href="/employee/profile" class="nav-link"><i class="fas fa-user"></i><span>My Profile</span></a>
  </nav>
  <div class="sidebar-footer">
    <a href="/logout" class="nav-link nav-logout"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
  </div>
</div>

<div class="main-content" id="mainContent">
  <div class="topbar">
    <button class="topbar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <div class="topbar-title">Dashboard</div>
    <div class="topbar-right">
      <span class="role-pill role-employee"><i class="fas fa-user me-1"></i>Employee</span>
      <div class="topbar-avatar" th:text="${#strings.substring(employee.firstName,0,1)}">E</div>
    </div>
  </div>

  <div class="content-area">
    <!-- Welcome Banner -->
    <div class="welcome-banner mb-4">
      <div>
        <h4 class="mb-1">Hello, <span th:text="${employee.firstName}">Employee</span>!</h4>
        <p class="mb-0 opacity-75" th:text="${employee.designation + ' — ' + (employee.department != null ? employee.department.name : 'N/A')}"></p>
      </div>
      <a href="/employee/leaves" class="btn-primary"><i class="fas fa-plus"></i>Apply Leave</a>
    </div>

    <!-- Leave Balance Cards -->
    <h6 class="fw-700 mb-3" style="color:#475569;letter-spacing:.05em;text-transform:uppercase;font-size:.75rem;">Leave Balances</h6>
    <div class="row g-3 mb-4">
      <div th:each="balance : ${leaveBalances}" class="col-xl-2 col-md-4 col-6">
        <div class="lbal-card">
          <div class="lbal-type" th:text="${balance.leaveType.name}"></div>
          <div class="lbal-num" th:text="${balance.remainingDays}"></div>
          <div class="lbal-sub">of <span th:text="${balance.totalDays}"></span> days left</div>
          <div class="lbal-bar">
            <div class="lbal-fill"
                 th:style="'width:' + (${balance.totalDays} > 0 ? (${balance.remainingDays} * 100 / ${balance.totalDays}) : 0) + '%'"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="row g-4 mb-4">
      <div class="col-xl-3 col-md-6">
        <div class="stat-card s-orange">
          <div class="stat-icon-wrap"><i class="fas fa-hourglass-half"></i></div>
          <div>
            <div class="stat-val" th:text="${pendingCount}">0</div>
            <div class="stat-lbl">Pending Requests</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Recent Leaves -->
    <div class="card-glass">
      <div class="card-head">
        <h5><span class="icon" style="background:#ede9fe;color:#7c3aed;"><i class="fas fa-history"></i></span>Recent Leave Requests</h5>
        <a href="/employee/leaves" class="btn-outline" style="padding:6px 14px;font-size:.8rem;">View All</a>
      </div>
      <div class="card-body p0">
        <div class="table-responsive">
          <table class="tbl">
            <thead>
              <tr><th>Leave Type</th><th>From</th><th>To</th><th>Days</th><th>Status</th></tr>
            </thead>
            <tbody>
              <tr th:each="req : ${recentLeaves}">
                <td class="fw-600" th:text="${req.leaveType.name}"></td>
                <td th:text="${req.startDate}"></td>
                <td th:text="${req.endDate}"></td>
                <td><span class="badge bg-light text-dark border" th:text="${req.totalDays}+'d'"></span></td>
                <td>
                  <span th:class="${'sbadge ' + req.status.name().toLowerCase()}" th:text="${req.status}"></span>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(recentLeaves)}">
                <td colspan="5" class="text-center text-muted py-5">No leave requests yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
