<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>All Leaves - ELMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <link href="/css/style.css" rel="stylesheet"/>
</head>
<body class="app-body">
<div class="sidebar" id="sidebar">
    <div class="sidebar-brand"><i class="fas fa-calendar-check"></i><span>ELMS</span></div>
    <nav class="sidebar-nav">
        <a href="/admin/dashboard" class="nav-item"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
        <a href="/admin/employees" class="nav-item"><i class="fas fa-users"></i><span>Employees</span></a>
        <a href="/admin/departments" class="nav-item"><i class="fas fa-building"></i><span>Departments</span></a>
        <a href="/admin/leave-types" class="nav-item"><i class="fas fa-list-alt"></i><span>Leave Types</span></a>
        <a href="/admin/leaves" class="nav-item active"><i class="fas fa-calendar-times"></i><span>All Leaves</span></a>
    </nav>
    <div class="sidebar-footer"><a href="/logout" class="nav-item text-danger"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a></div>
</div>
<div class="main-content" id="mainContent">
    <div class="topbar">
        <button class="btn sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <div class="topbar-title">All Leave Requests</div>
        <div class="topbar-right">
            <span class="badge-role badge-admin-role">ADMIN</span>
            <span class="topbar-user"><i class="fas fa-user-circle me-1"></i><span sec:authentication="name"></span></span>
        </div>
    </div>
    <div class="content-area">
        <div class="card-custom">
            <div class="card-custom-header">
                <h5><i class="fas fa-calendar-times me-2 text-orange"></i>All Leave Requests</h5>
            </div>
            <div class="card-custom-body p-0">
                <div class="table-responsive">
                    <table class="table table-vibrant mb-0">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Employee</th>
                                <th>Leave Type</th>
                                <th>From</th>
                                <th>To</th>
                                <th>Days</th>
                                <th>Reason</th>
                                <th>Status</th>
                                <th>Reviewed By</th>
                                <th>Applied On</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="req, i : ${leaveRequests}">
                                <td th:text="${i.count}"></td>
                                <td class="fw-semibold" th:text="${req.employee.fullName}"></td>
                                <td th:text="${req.leaveType.name}"></td>
                                <td th:text="${req.startDate}"></td>
                                <td th:text="${req.endDate}"></td>
                                <td><span class="badge bg-secondary" th:text="${req.totalDays} + ' days'"></span></td>
                                <td><span th:text="${#strings.abbreviate(req.reason, 30)}"></span></td>
                                <td>
                                    <span th:class="${'status-badge status-' + req.status.name().toLowerCase()}"
                                          th:text="${req.status}"></span>
                                </td>
                                <td th:text="${req.reviewedBy != null ? req.reviewedBy.fullName : '-'}"></td>
                                <td th:text="${#temporals.format(req.appliedAt, 'dd MMM yyyy')}"></td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(leaveRequests)}">
                                <td colspan="10" class="text-center text-muted py-4">No leave requests found.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
