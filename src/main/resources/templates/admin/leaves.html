<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>All Leaves — ELMS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="/css/style.css" rel="stylesheet"/>
</head>
<body class="app-body">
<div class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon"><i class="fas fa-calendar-check"></i></div>
    <div><div class="brand-text">ELMS</div><div class="brand-sub">Leave Management</div></div>
  </div>
  <div class="sidebar-divider"></div>
  <nav class="sidebar-nav">
    <div class="sidebar-section">Main</div>
    <a href="/admin/dashboard" class="nav-link"><i class="fas fa-grid-2"></i><span>Dashboard</span></a>
    <a href="/admin/employees" class="nav-link"><i class="fas fa-users"></i><span>Employees</span></a>
    <div class="sidebar-section">Settings</div>
    <a href="/admin/departments" class="nav-link"><i class="fas fa-building"></i><span>Departments</span></a>
    <a href="/admin/leave-types" class="nav-link"><i class="fas fa-tags"></i><span>Leave Types</span></a>
    <a href="/admin/leaves" class="nav-link active"><i class="fas fa-calendar-times"></i><span>All Leaves</span></a>
  </nav>
  <div class="sidebar-footer">
    <a href="/logout" class="nav-link nav-logout"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
  </div>
</div>

<div class="main-content" id="mainContent">
  <div class="topbar">
    <button class="topbar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <div class="topbar-title">All Leave Requests</div>
    <div class="topbar-right">
      <span class="role-pill role-admin"><i class="fas fa-shield-alt me-1"></i>Admin</span>
      <div class="topbar-avatar">A</div>
    </div>
  </div>
  <div class="content-area">
    <div class="card-glass">
      <div class="card-head">
        <h5><span class="icon" style="background:#fff7ed;color:#ea580c;"><i class="fas fa-calendar-times"></i></span>All Leave Requests</h5>
        <span class="badge bg-light text-dark border" th:text="${#lists.size(leaveRequests)} + ' records'"></span>
      </div>
      <div class="card-body p0">
        <div class="table-responsive">
          <table class="tbl">
            <thead>
              <tr><th>#</th><th>Employee</th><th>Leave Type</th><th>From</th><th>To</th><th>Days</th><th>Reason</th><th>Status</th><th>Reviewed By</th><th>Applied On</th></tr>
            </thead>
            <tbody>
              <tr th:each="req, i : ${leaveRequests}">
                <td class="text-muted" th:text="${i.count}"></td>
                <td>
                  <div class="d-flex align-items-center gap-2">
                    <div class="team-av" style="width:32px;height:32px;border-radius:8px;font-size:.75rem;"
                         th:text="${#strings.substring(req.employee.firstName,0,1)+#strings.substring(req.employee.lastName,0,1)}"></div>
                    <span class="fw-600" th:text="${req.employee.fullName}"></span>
                  </div>
                </td>
                <td th:text="${req.leaveType.name}"></td>
                <td th:text="${req.startDate}"></td>
                <td th:text="${req.endDate}"></td>
                <td><span class="badge bg-light text-dark border" th:text="${req.totalDays}+'d'"></span></td>
                <td class="text-muted">
                  <span th:text="${req.reason != null ? (#strings.length(req.reason) > 30 ? #strings.substring(req.reason,0,30)+'...' : req.reason) : '—'}"></span>
                </td>
                <td>
                  <span th:class="${'sbadge ' + req.status.name().toLowerCase()}" th:text="${req.status}"></span>
                </td>
                <td class="text-muted" th:text="${req.reviewedBy != null ? req.reviewedBy.fullName : '—'}"></td>
                <td class="text-muted" th:text="${#temporals.format(req.appliedAt, 'dd MMM yyyy')}"></td>
              </tr>
              <tr th:if="${#lists.isEmpty(leaveRequests)}">
                <td colspan="10" class="text-center text-muted py-5">No leave requests found.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
