<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Departments — ELMS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="/css/style.css" rel="stylesheet"/>
</head>
<body class="app-body">
<div class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon"><i class="fas fa-calendar-check"></i></div>
    <div><div class="brand-text">ELMS</div><div class="brand-sub">Leave Management</div></div>
  </div>
  <div class="sidebar-divider"></div>
  <nav class="sidebar-nav">
    <div class="sidebar-section">Main</div>
    <a href="/admin/dashboard" class="nav-link"><i class="fas fa-grid-2"></i><span>Dashboard</span></a>
    <a href="/admin/employees" class="nav-link"><i class="fas fa-users"></i><span>Employees</span></a>
    <div class="sidebar-section">Settings</div>
    <a href="/admin/departments" class="nav-link active"><i class="fas fa-building"></i><span>Departments</span></a>
    <a href="/admin/leave-types" class="nav-link"><i class="fas fa-tags"></i><span>Leave Types</span></a>
    <a href="/admin/leaves" class="nav-link"><i class="fas fa-calendar-times"></i><span>All Leaves</span></a>
  </nav>
  <div class="sidebar-footer">
    <a href="/logout" class="nav-link nav-logout"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
  </div>
</div>

<div class="main-content" id="mainContent">
  <div class="topbar">
    <button class="topbar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <div class="topbar-title">Departments</div>
    <div class="topbar-right">
      <span class="role-pill role-admin"><i class="fas fa-shield-alt me-1"></i>Admin</span>
      <div class="topbar-avatar">A</div>
    </div>
  </div>
  <div class="content-area">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-3">
      <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mb-3">
      <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">
      <!-- Add Department Form -->
      <div class="col-md-4">
        <div class="card-glass">
          <div class="card-head">
            <h5><span class="icon" style="background:#dbeafe;color:#2563eb;"><i class="fas fa-plus"></i></span>Add Department</h5>
          </div>
          <div class="card-body" style="padding:1.5rem;">
            <form th:action="@{/admin/departments/add}" method="post">
              <div class="mb-3">
                <label class="form-label">Department Name *</label>
                <input type="text" name="name" class="form-control form-ctrl" required placeholder="e.g. Engineering"/>
              </div>
              <div class="mb-4">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control form-ctrl" rows="3" placeholder="Brief description..."></textarea>
              </div>
              <button type="submit" class="btn-primary w-100"><i class="fas fa-save"></i>Add Department</button>
            </form>
          </div>
        </div>
      </div>

      <!-- Departments Table -->
      <div class="col-md-8">
        <div class="card-glass">
          <div class="card-head">
            <h5><span class="icon" style="background:#dbeafe;color:#2563eb;"><i class="fas fa-building"></i></span>All Departments</h5>
            <span class="badge bg-light text-dark border" th:text="${#lists.size(departments)} + ' total'"></span>
          </div>
          <div class="card-body p0">
            <div class="table-responsive">
              <table class="tbl">
                <thead>
                  <tr><th>#</th><th>Department Name</th><th>Description</th></tr>
                </thead>
                <tbody>
                  <tr th:each="dept, i : ${departments}">
                    <td class="text-muted" th:text="${i.count}"></td>
                    <td>
                      <div class="d-flex align-items-center gap-2">
                        <div class="team-av" style="width:32px;height:32px;border-radius:8px;font-size:.75rem;background:linear-gradient(135deg,#3b82f6,#1d4ed8);">
                          <span th:text="${#strings.substring(dept.name,0,1)}"></span>
                        </div>
                        <span class="fw-600" th:text="${dept.name}"></span>
                      </div>
                    </td>
                    <td class="text-muted" th:text="${dept.description != null ? dept.description : '—'}"></td>
                  </tr>
                  <tr th:if="${#lists.isEmpty(departments)}">
                    <td colspan="3" class="text-center text-muted py-5">No departments found.</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
