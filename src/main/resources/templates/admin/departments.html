<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Departments - ELMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <link href="/css/style.css" rel="stylesheet"/>
</head>
<body class="app-body">
<div class="sidebar" id="sidebar">
    <div class="sidebar-brand"><i class="fas fa-calendar-check"></i><span>ELMS</span></div>
    <nav class="sidebar-nav">
        <a href="/admin/dashboard" class="nav-item"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
        <a href="/admin/employees" class="nav-item"><i class="fas fa-users"></i><span>Employees</span></a>
        <a href="/admin/departments" class="nav-item active"><i class="fas fa-building"></i><span>Departments</span></a>
        <a href="/admin/leave-types" class="nav-item"><i class="fas fa-list-alt"></i><span>Leave Types</span></a>
        <a href="/admin/leaves" class="nav-item"><i class="fas fa-calendar-times"></i><span>All Leaves</span></a>
    </nav>
    <div class="sidebar-footer"><a href="/logout" class="nav-item text-danger"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a></div>
</div>
<div class="main-content" id="mainContent">
    <div class="topbar">
        <button class="btn sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <div class="topbar-title">Departments</div>
        <div class="topbar-right">
            <span class="badge-role badge-admin-role">ADMIN</span>
            <span class="topbar-user"><i class="fas fa-user-circle me-1"></i><span sec:authentication="name"></span></span>
        </div>
    </div>
    <div class="content-area">
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card-custom">
                    <div class="card-custom-header"><h5><i class="fas fa-plus me-2 text-blue"></i>Add Department</h5></div>
                    <div class="card-custom-body">
                        <form th:action="@{/admin/departments/add}" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Department Name *</label>
                                <input type="text" name="name" class="form-control form-control-vibrant" required/>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Description</label>
                                <textarea name="description" class="form-control form-control-vibrant" rows="3"></textarea>
                            </div>
                            <button type="submit" class="btn btn-vibrant-blue w-100"><i class="fas fa-save me-2"></i>Add Department</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card-custom">
                    <div class="card-custom-header"><h5><i class="fas fa-building me-2 text-blue"></i>All Departments</h5></div>
                    <div class="card-custom-body p-0">
                        <div class="table-responsive">
                            <table class="table table-vibrant mb-0">
                                <thead><tr><th>#</th><th>Department Name</th><th>Description</th></tr></thead>
                                <tbody>
                                    <tr th:each="dept, i : ${departments}">
                                        <td th:text="${i.count}"></td>
                                        <td class="fw-semibold" th:text="${dept.name}"></td>
                                        <td th:text="${dept.description}"></td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(departments)}">
                                        <td colspan="3" class="text-center text-muted py-4">No departments found.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
