<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Employees - ELMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <link href="/css/style.css" rel="stylesheet"/>
</head>
<body class="app-body">

<div class="sidebar" id="sidebar">
    <div class="sidebar-brand"><i class="fas fa-calendar-check"></i><span>ELMS</span></div>
    <nav class="sidebar-nav">
        <a href="/admin/dashboard" class="nav-item"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
        <a href="/admin/employees" class="nav-item active"><i class="fas fa-users"></i><span>Employees</span></a>
        <a href="/admin/departments" class="nav-item"><i class="fas fa-building"></i><span>Departments</span></a>
        <a href="/admin/leave-types" class="nav-item"><i class="fas fa-list-alt"></i><span>Leave Types</span></a>
        <a href="/admin/leaves" class="nav-item"><i class="fas fa-calendar-times"></i><span>All Leaves</span></a>
    </nav>
    <div class="sidebar-footer">
        <a href="/logout" class="nav-item text-danger"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
    </div>
</div>

<div class="main-content" id="mainContent">
    <div class="topbar">
        <button class="btn sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <div class="topbar-title">Manage Employees</div>
        <div class="topbar-right">
            <span class="badge-role badge-admin-role">ADMIN</span>
            <span class="topbar-user"><i class="fas fa-user-circle me-1"></i><span sec:authentication="name">Admin</span></span>
        </div>
    </div>

    <div class="content-area">
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card-custom">
            <div class="card-custom-header">
                <h5><i class="fas fa-users me-2 text-purple"></i>All Employees</h5>
                <button class="btn btn-vibrant-purple" data-bs-toggle="modal" data-bs-target="#addEmployeeModal">
                    <i class="fas fa-user-plus me-2"></i>Add Employee
                </button>
            </div>
            <div class="card-custom-body p-0">
                <div class="table-responsive">
                    <table class="table table-vibrant mb-0" id="employeeTable">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Code</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Department</th>
                                <th>Designation</th>
                                <th>Manager</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="emp, i : ${employees}">
                                <td th:text="${i.count}"></td>
                                <td><span class="badge bg-secondary" th:text="${emp.employeeCode}"></span></td>
                                <td class="fw-semibold" th:text="${emp.fullName}"></td>
                                <td th:text="${emp.email}"></td>
                                <td th:text="${emp.department != null ? emp.department.name : '-'}"></td>
                                <td th:text="${emp.designation}"></td>
                                <td th:text="${emp.manager != null ? emp.manager.fullName : '-'}"></td>
                                <td>
                                    <span th:class="${'badge ' + (emp.user.role.name() == 'ROLE_ADMIN' ? 'bg-danger' : emp.user.role.name() == 'ROLE_MANAGER' ? 'bg-warning text-dark' : 'bg-info text-dark')}"
                                          th:text="${emp.user.role.name().replace('ROLE_','')}"></span>
                                </td>
                                <td>
                                    <span th:if="${emp.active}" class="status-badge status-approved">Active</span>
                                    <span th:unless="${emp.active}" class="status-badge status-rejected">Inactive</span>
                                </td>
                                <td>
                                    <button class="btn btn-sm btn-vibrant-blue me-1"
                                            th:attr="onclick='openEditModal(' + ${emp.id} + ',\'' + ${emp.firstName} + '\',\'' + ${emp.lastName} + '\',\'' + ${emp.email} + '\',\'' + ${emp.phone} + '\',\'' + ${emp.designation} + '\',' + (${emp.department} != null ? ${emp.department.id} : 'null') + ',' + (${emp.manager} != null ? ${emp.manager.id} : 'null') + ')'">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <form th:if="${emp.active}" th:action="@{/admin/employees/deactivate/{id}(id=${emp.id})}" method="post" style="display:inline;">
                                        <button type="submit" class="btn btn-sm btn-vibrant-orange"
                                                onclick="return confirm('Deactivate this employee?')">
                                            <i class="fas fa-ban"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(employees)}">
                                <td colspan="10" class="text-center text-muted py-4">No employees found.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Add Employee Modal -->
<div class="modal fade" id="addEmployeeModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content modal-vibrant">
            <div class="modal-header modal-header-purple">
                <h5 class="modal-title"><i class="fas fa-user-plus me-2"></i>Add New Employee</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/admin/employees/add}" method="post">
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">First Name *</label>
                            <input type="text" name="firstName" class="form-control form-control-vibrant" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Last Name *</label>
                            <input type="text" name="lastName" class="form-control form-control-vibrant" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Email *</label>
                            <input type="email" name="email" class="form-control form-control-vibrant" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Phone</label>
                            <input type="text" name="phone" class="form-control form-control-vibrant"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Employee Code *</label>
                            <input type="text" name="employeeCode" class="form-control form-control-vibrant" required placeholder="EMP-006"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Designation *</label>
                            <input type="text" name="designation" class="form-control form-control-vibrant" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Joining Date *</label>
                            <input type="date" name="joiningDate" class="form-control form-control-vibrant" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Department</label>
                            <select name="departmentId" class="form-select form-select-vibrant">
                                <option value="">-- Select Department --</option>
                                <option th:each="dept : ${departments}" th:value="${dept.id}" th:text="${dept.name}"></option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Manager</label>
                            <select name="managerId" class="form-select form-select-vibrant">
                                <option value="">-- No Manager --</option>
                                <option th:each="mgr : ${managers}" th:value="${mgr.id}" th:text="${mgr.fullName}"></option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Role *</label>
                            <select name="role" class="form-select form-select-vibrant" required>
                                <option value="ROLE_EMPLOYEE">Employee</option>
                                <option value="ROLE_MANAGER">Manager</option>
                                <option value="ROLE_ADMIN">Admin</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Username *</label>
                            <input type="text" name="username" class="form-control form-control-vibrant" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Password *</label>
                            <input type="password" name="password" class="form-control form-control-vibrant" required/>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-vibrant-purple"><i class="fas fa-save me-2"></i>Save Employee</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Edit Employee Modal -->
<div class="modal fade" id="editEmployeeModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content modal-vibrant">
            <div class="modal-header modal-header-blue">
                <h5 class="modal-title"><i class="fas fa-edit me-2"></i>Edit Employee</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form id="editForm" method="post">
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">First Name *</label>
                            <input type="text" name="firstName" id="editFirstName" class="form-control form-control-vibrant" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Last Name *</label>
                            <input type="text" name="lastName" id="editLastName" class="form-control form-control-vibrant" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Email *</label>
                            <input type="email" name="email" id="editEmail" class="form-control form-control-vibrant" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Phone</label>
                            <input type="text" name="phone" id="editPhone" class="form-control form-control-vibrant"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Designation *</label>
                            <input type="text" name="designation" id="editDesignation" class="form-control form-control-vibrant" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Department</label>
                            <select name="departmentId" id="editDeptId" class="form-select form-select-vibrant">
                                <option value="">-- Select Department --</option>
                                <option th:each="dept : ${departments}" th:value="${dept.id}" th:text="${dept.name}"></option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Manager</label>
                            <select name="managerId" id="editMgrId" class="form-select form-select-vibrant">
                                <option value="">-- No Manager --</option>
                                <option th:each="mgr : ${managers}" th:value="${mgr.id}" th:text="${mgr.fullName}"></option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-vibrant-blue"><i class="fas fa-save me-2"></i>Update Employee</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>
<script>
function openEditModal(id, firstName, lastName, email, phone, designation, deptId, mgrId) {
    document.getElementById('editForm').action = '/admin/employees/update/' + id;
    document.getElementById('editFirstName').value = firstName;
    document.getElementById('editLastName').value = lastName;
    document.getElementById('editEmail').value = email;
    document.getElementById('editPhone').value = phone || '';
    document.getElementById('editDesignation').value = designation;
    if (deptId) document.getElementById('editDeptId').value = deptId;
    if (mgrId) document.getElementById('editMgrId').value = mgrId;
    new bootstrap.Modal(document.getElementById('editEmployeeModal')).show();
}
</script>
</body>
</html>
