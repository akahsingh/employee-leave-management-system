<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Employees — ELMS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="/css/style.css" rel="stylesheet"/>
</head>
<body class="app-body">
<div class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon"><i class="fas fa-calendar-check"></i></div>
    <div><div class="brand-text">ELMS</div><div class="brand-sub">Leave Management</div></div>
  </div>
  <div class="sidebar-divider"></div>
  <nav class="sidebar-nav">
    <div class="sidebar-section">Main</div>
    <a href="/admin/dashboard" class="nav-link"><i class="fas fa-grid-2"></i><span>Dashboard</span></a>
    <a href="/admin/employees" class="nav-link active"><i class="fas fa-users"></i><span>Employees</span></a>
    <div class="sidebar-section">Settings</div>
    <a href="/admin/departments" class="nav-link"><i class="fas fa-building"></i><span>Departments</span></a>
    <a href="/admin/leave-types" class="nav-link"><i class="fas fa-tags"></i><span>Leave Types</span></a>
    <a href="/admin/leaves" class="nav-link"><i class="fas fa-calendar-times"></i><span>All Leaves</span></a>
  </nav>
  <div class="sidebar-footer">
    <a href="/logout" class="nav-link nav-logout"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
  </div>
</div>

<div class="main-content" id="mainContent">
  <div class="topbar">
    <button class="topbar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <div class="topbar-title">Employees</div>
    <div class="topbar-right">
      <span class="role-pill role-admin"><i class="fas fa-shield-alt me-1"></i>Admin</span>
      <div class="topbar-avatar">A</div>
    </div>
  </div>
  <div class="content-area">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-3">
      <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mb-3">
      <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card-glass">
      <div class="card-head">
        <h5><span class="icon" style="background:#ede9fe;color:#7c3aed;"><i class="fas fa-users"></i></span>All Employees</h5>
        <button class="btn-primary" data-bs-toggle="modal" data-bs-target="#addModal">
          <i class="fas fa-user-plus"></i>Add Employee
        </button>
      </div>
      <div class="card-body p0">
        <div class="table-responsive">
          <table class="tbl">
            <thead>
              <tr><th>#</th><th>Code</th><th>Name</th><th>Email</th><th>Department</th><th>Designation</th><th>Manager</th><th>Role</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody>
              <tr th:each="e,i : ${employees}">
                <td class="text-muted" th:text="${i.count}"></td>
                <td><span class="badge bg-light text-dark border" th:text="${e.employeeCode}"></span></td>
                <td>
                  <div class="d-flex align-items-center gap-2">
                    <div class="team-av" style="width:34px;height:34px;border-radius:10px;font-size:.8rem;"
                         th:text="${#strings.substring(e.firstName,0,1)+#strings.substring(e.lastName,0,1)}"></div>
                    <span class="fw-600" th:text="${e.fullName}"></span>
                  </div>
                </td>
                <td class="text-muted" th:text="${e.email}"></td>
                <td th:text="${e.department!=null?e.department.name:'-'}"></td>
                <td th:text="${e.designation}"></td>
                <td th:text="${e.manager!=null?e.manager.fullName:'-'}"></td>
                <td>
                  <span th:class="${'sbadge ' + (e.user.role.name()=='ROLE_ADMIN'?'rejected':e.user.role.name()=='ROLE_MANAGER'?'pending':'approved')}"
                        th:text="${e.user.role.name().replace('ROLE_','')}"></span>
                </td>
                <td>
                  <span th:if="${e.active}" class="sbadge approved">Active</span>
                  <span th:unless="${e.active}" class="sbadge cancelled">Inactive</span>
                </td>
                <td>
                  <div class="d-flex gap-1">
                    <button class="btn-icon edit"
                            th:attr="onclick='openEdit('+${e.id}+',\''+${e.firstName}+'\',\''+${e.lastName}+'\',\''+${e.email}+'\',\''+(${e.phone}!=null?${e.phone}:'')+'\',\''+${e.designation}+'\',' +(${e.department}!=null?${e.department.id}:'null')+','+(${e.manager}!=null?${e.manager.id}:'null')+')'">
                      <i class="fas fa-pen"></i>
                    </button>
                    <form th:if="${e.active}" th:action="@{/admin/employees/deactivate/{id}(id=${e.id})}" method="post" style="display:inline;">
                      <button type="submit" class="btn-icon del" onclick="return confirm('Deactivate this employee?')">
                        <i class="fas fa-ban"></i>
                      </button>
                    </form>
                  </div>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(employees)}">
                <td colspan="10" class="text-center text-muted py-5">No employees found.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add Employee Modal -->
<div class="modal fade" id="addModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header mh-primary">
        <h5 class="modal-title"><i class="fas fa-user-plus me-2"></i>Add New Employee</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <form th:action="@{/admin/employees/add}" method="post">
        <div class="modal-body p-4">
          <div class="row g-3">
            <div class="col-md-6"><label class="form-label">First Name *</label><input type="text" name="firstName" class="form-control form-ctrl" required/></div>
            <div class="col-md-6"><label class="form-label">Last Name *</label><input type="text" name="lastName" class="form-control form-ctrl" required/></div>
            <div class="col-md-6"><label class="form-label">Email *</label><input type="email" name="email" class="form-control form-ctrl" required/></div>
            <div class="col-md-6"><label class="form-label">Phone</label><input type="text" name="phone" class="form-control form-ctrl"/></div>
            <div class="col-md-6"><label class="form-label">Employee Code *</label><input type="text" name="employeeCode" class="form-control form-ctrl" required placeholder="EMP-006"/></div>
            <div class="col-md-6"><label class="form-label">Designation *</label><input type="text" name="designation" class="form-control form-ctrl" required/></div>
            <div class="col-md-6"><label class="form-label">Joining Date *</label><input type="date" name="joiningDate" class="form-control form-ctrl" required/></div>
            <div class="col-md-6">
              <label class="form-label">Department</label>
              <select name="departmentId" class="form-select form-ctrl">
                <option value="">-- Select --</option>
                <option th:each="d:${departments}" th:value="${d.id}" th:text="${d.name}"></option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Manager</label>
              <select name="managerId" class="form-select form-ctrl">
                <option value="">-- No Manager --</option>
                <option th:each="m:${managers}" th:value="${m.id}" th:text="${m.fullName}"></option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Role *</label>
              <select name="role" class="form-select form-ctrl" required>
                <option value="ROLE_EMPLOYEE">Employee</option>
                <option value="ROLE_MANAGER">Manager</option>
                <option value="ROLE_ADMIN">Admin</option>
              </select>
            </div>
            <div class="col-md-6"><label class="form-label">Username *</label><input type="text" name="username" class="form-control form-ctrl" required/></div>
            <div class="col-md-6"><label class="form-label">Password *</label><input type="password" name="password" class="form-control form-ctrl" required/></div>
          </div>
        </div>
        <div class="modal-footer px-4 pb-4">
          <button type="button" class="btn-outline" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn-primary"><i class="fas fa-save"></i>Save Employee</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Edit Employee Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header mh-info">
        <h5 class="modal-title"><i class="fas fa-pen me-2"></i>Edit Employee</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <form id="editForm" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="modal-body p-4">
          <div class="row g-3">
            <div class="col-md-6"><label class="form-label">First Name *</label><input type="text" name="firstName" id="eFN" class="form-control form-ctrl" required/></div>
            <div class="col-md-6"><label class="form-label">Last Name *</label><input type="text" name="lastName" id="eLN" class="form-control form-ctrl" required/></div>
            <div class="col-md-6"><label class="form-label">Email *</label><input type="email" name="email" id="eEM" class="form-control form-ctrl" required/></div>
            <div class="col-md-6"><label class="form-label">Phone</label><input type="text" name="phone" id="ePH" class="form-control form-ctrl"/></div>
            <div class="col-md-6"><label class="form-label">Designation *</label><input type="text" name="designation" id="eDG" class="form-control form-ctrl" required/></div>
            <div class="col-md-6">
              <label class="form-label">Department</label>
              <select name="departmentId" id="eDept" class="form-select form-ctrl">
                <option value="">-- Select --</option>
                <option th:each="d:${departments}" th:value="${d.id}" th:text="${d.name}"></option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Manager</label>
              <select name="managerId" id="eMgr" class="form-select form-ctrl">
                <option value="">-- No Manager --</option>
                <option th:each="m:${managers}" th:value="${m.id}" th:text="${m.fullName}"></option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer px-4 pb-4">
          <button type="button" class="btn-outline" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn-primary"><i class="fas fa-save"></i>Update Employee</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>
<script>
function openEdit(id,fn,ln,em,ph,dg,dept,mgr){
  document.getElementById('editForm').action='/admin/employees/update/'+id;
  document.getElementById('eFN').value=fn;
  document.getElementById('eLN').value=ln;
  document.getElementById('eEM').value=em;
  document.getElementById('ePH').value=ph||'';
  document.getElementById('eDG').value=dg;
  if(dept)document.getElementById('eDept').value=dept;
  if(mgr)document.getElementById('eMgr').value=mgr;
  new bootstrap.Modal(document.getElementById('editModal')).show();
}
</script>
</body>
</html>
